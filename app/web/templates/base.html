<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Auto Sort{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="/">Auto Sort</a>
    <div class="navbar-nav me-auto">
        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Дашборд</a>
        <a class="nav-link {% if request.url.path == '/tasks' %}active{% endif %}" href="/tasks">Задания</a>
        <a class="nav-link {% if request.url.path == '/settings' %}active{% endif %}" href="/settings">Настройки</a>
    </div>
    <div class="navbar-nav">
        <a class="nav-link text-secondary" href="/logout">Выйти</a>
    </div>
</nav>

{% if dry_run is defined and dry_run %}
<div class="alert alert-warning alert-dismissible rounded-0 mb-0 py-2 text-center" role="alert">
    <strong>DRY RUN</strong> — реальные запросы к WB не отправляются
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<div class="container-fluid mt-4 px-4">
    {% if msg is defined and msg %}
    <div class="alert alert-success alert-dismissible" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
